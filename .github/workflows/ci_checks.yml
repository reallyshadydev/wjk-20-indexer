name: CI Checks

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA for checks (default: latest in branch)'
        required: false
        default: ''
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  semgrep-ci:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
    - name: Determine commit SHA
      shell: bash
      env:
        INPUT_SHA: ${{ github.event.inputs.sha }}
        GITHUB_SHA_REF: ${{ github.sha }}
        GH_TOKEN: ${{ github.token }}
        GH_API_URL: ${{ github.api_url }}
        GH_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail

        resolve_commit_ref() {
          local ref="$1"
          local sha

          if [ -z "$ref" ]; then
            printf '%s\n' "$GITHUB_SHA_REF"
            return
          fi

          sha=$(curl -fsSL \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GH_API_URL}/repos/${GH_REPOSITORY}/commits/${ref}" \
            | sed -nE 's/^[^"]*"sha"[[:space:]]*:[[:space:]]*"([0-9a-f]{40})".*/\1/p' \
            | head -n1)

          if [ -z "$sha" ]; then
            echo "::error::Unable to resolve commit ref '${ref}' to a full SHA."
            exit 1
          fi

          printf '%s\n' "$sha"
        }

        SCAN_REF="$(resolve_commit_ref "$INPUT_SHA")"
        echo "SCAN_REF=$SCAN_REF" >> "$GITHUB_ENV"

    - name: Checkout repository at selected commit
      uses: actions/checkout@v5
      with:
        ref: ${{ env.SCAN_REF }}

    - name: Install Semgrep
      shell: bash
      run: |
        set -euo pipefail

        sudo apt-get update
        sudo apt-get install -y python3-pip pipx
        pipx ensurepath
        pipx install semgrep || pipx upgrade semgrep
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Report all (non-blocking)
      continue-on-error: true
      shell: bash
      run: |
        set -euo pipefail

        semgrep --config p/ci .
